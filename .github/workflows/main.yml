name: 📱 بناء APK - واحة اللعب

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v3
      
      - name: ☕ إعداد Java JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: ✅ إعطاء صلاحيات Gradle
        run: chmod +x gradlew
      
      - name: 🔨 بناء Debug APK
        run: ./gradlew assembleDebug
      
      - name: 📤 رفع APK كـ Artifact
        uses: actions/upload-artifact@v3
        with:
          name: واحة-اللعب-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: ✨ إنشاء Release
        uses: actions/create-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: 🎮 واحة اللعب - ${{ github.ref }}
          draft: false
          prerelease: false
